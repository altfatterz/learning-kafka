---
apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: confluent
spec:
  replicas: 1
  image:
    application: confluentinc/cp-schema-registry:8.1.1
    init: confluentinc/confluent-init-container:3.1.1
  dependencies:
    kafka:
      bootstrapEndpoint: kafka:9071